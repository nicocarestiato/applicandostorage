<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classe 2AA — File offline | Applicando 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; color: #222; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; margin: 20px 24px 0; padding: 8px 16px; background: #fff; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 500; color: #555; box-shadow: 0 1px 4px rgba(0,0,0,0.09); transition: box-shadow 0.15s; }
    .back-btn:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.13); color: #222; }
    header { text-align: center; padding: 20px 24px 16px; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a1a1a; letter-spacing: 0.02em; }
    header p { margin-top: 4px; font-size: 0.85rem; color: #888; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px 40px; }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .file-btn { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); padding: 18px 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-decoration: none; transition: box-shadow 0.15s, transform 0.12s; }
    .file-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.14); transform: translateY(-2px); }
    .file-icon { font-size: 2.4rem; line-height: 1; }
    .file-name { font-size: 0.82rem; font-weight: 500; color: #333; text-align: center; word-break: break-word; line-height: 1.3; }
    .file-btn.pdf  { border-top: 3px solid #e74c3c; }
    .file-btn.video { border-top: 3px solid #2c3e50; }
    .file-btn.ppt  { border-top: 3px solid #e67e22; }
    .file-btn.word { border-top: 3px solid #2980b9; }
    .file-btn.img  { border-top: 3px solid #27ae60; }
    .file-btn.other { border-top: 3px solid #95a5a6; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #ccc; }
    .empty-icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-state p { font-size: 0.9rem; font-style: italic; }
  </style>
</head>
<body>
  <a class="back-btn" href="../">← Torna all'hub</a>
  <header><h1>Classe 2AA</h1><p>File disponibili offline</p></header>
  <div class="container">
    <div class="files-grid">
      <div class="empty-state"><div class="empty-icon">📂</div><p>Nessun file caricato per questa classe.</p></div>
    </div>
  </div>
</body>
</html>
